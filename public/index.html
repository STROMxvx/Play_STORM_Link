<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad_STORM_Link - Спецсвязь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- ЛЕВАЯ БОКОВАЯ ПАНЕЛЬ -->
        <div class="sidebar-left">
            <div class="user-profile" id="userProfile">
                <div class="user-rank" id="userRankBadge">?</div>
                <div class="user-info">
                    <div class="user-nick" id="userNick">Загрузка...</div>
                    <div class="user-name" id="userName"></div>
                </div>
                <div class="user-actions">
                    <button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
                </div>
            </div>
            
            <div class="chats-list" id="chatsList">
                <!-- Меню будет построено через JS -->
            </div>
        </div>
        
        <!-- ЦЕНТРАЛЬНАЯ ПАНЕЛЬ (ЧАТ) -->
        <div class="chat-main">
            <div class="chat-header" id="chatHeader">
                <span id="currentChatName">Информация</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    ⚡ Добро пожаловать в Squad_STORM_Link ⚡<br>
                    <small>Выберите чат слева</small>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                <button id="sendBtn">📤 Отправить</button>
            </div>
        </div>
        
        <!-- ПРАВАЯ ПАНЕЛЬ (УЧАСТНИКИ) - ТОЛЬКО LVL7 -->
        <div class="sidebar-right" id="sidebarRight" style="display: none;">
            <div class="members-header">
                <span>👥 Участники</span>
                <button id="addMemberBtn" class="add-member-btn" title="Добавить участника">➕</button>
            </div>
            <div class="members-list" id="membersList"></div>
        </div>
    </div>
    
    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
