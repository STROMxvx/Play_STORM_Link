<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Squad_STORM_Link - Спецсвязь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Мобильные кнопки -->
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    <button class="mobile-users-btn" id="mobileUsersBtn">👥</button>
    <div class="mobile-overlay" id="mobileOverlay"></div>
    
    <div class="app-container">
        <div class="sidebar-left" id="sidebarLeft">
            <div class="user-profile">
                <div class="user-rank" id="userRankBadge">?</div>
                <div class="user-info">
                    <div class="user-nick" id="userNick">Загрузка...</div>
                    <div class="user-name" id="userName"></div>
                </div>
                <button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header" id="chatHeader">
                <span id="currentChatName">Информация</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">⚡ Добро пожаловать в Squad_STORM_Link ⚡<br><small>Выберите чат слева</small></div>
            </div>
            <div class="chat-input-area" id="chatInputArea">
                <div class="input-buttons">
                    <button id="attachBtn" class="input-btn" title="Прикрепить файл">📎</button>
                    <button id="voiceBtn" class="input-btn" title="Голосовое сообщение">🎤</button>
                </div>
                <div class="recording-indicator" id="recordingIndicator">
                    <span>🔴 Запись...</span>
                    <span class="recording-timer" id="recordingTimer">0:00</span>
                </div>
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button id="sendBtn">📤</button>
            </div>
        </div>
        
        <div class="sidebar-right" id="sidebarRight">
            <div class="members-header">
                <span>👥 Участники</span>
                <button id="addMemberBtn" class="add-member-btn" title="Добавить участника">➕</button>
            </div>
            <div class="members-list" id="membersList"></div>
        </div>
    </div>
    
    <!-- Индикатор загрузки файлов -->
    <div class="upload-progress" id="uploadProgress">
        <span>📁 Загрузка: <span id="uploadPercent">0</span>%</span>
        <progress id="uploadProgressBar" value="0" max="100" style="width:100%; margin-top:5px;"></progress>
    </div>
    
    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
