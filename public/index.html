<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad_STORM_Link - Спецсвязь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar-left">
            <div class="user-profile">
                <div class="user-rank" id="userRankBadge">?</div>
                <div class="user-info">
                    <div class="user-nick" id="userNick">Загрузка...</div>
                    <div class="user-name" id="userName"></div>
                </div>
                <button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <span id="currentChatName">Информация</span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area" id="chatInputArea">
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button id="sendBtn">📤</button>
            </div>
        </div>
        
        <div class="sidebar-right" id="sidebarRight" style="display: none;">
            <div class="members-header">
                <span>👥 Участники</span>
                <button id="addMemberBtn" class="add-member-btn">➕</button>
            </div>
            <div class="members-list" id="membersList"></div>
        </div>
    </div>
    
    <!-- Окно звонка -->
    <div id="callWindow" style="display:none; position:fixed; bottom:20px; right:20px; width:320px; background:linear-gradient(145deg,#0e1a2a,#0a1020); border:1px solid #00bfff; border-radius:20px; z-index:1000; box-shadow:0 0 20px rgba(0,191,255,0.3);">
        <div style="padding:12px; background:#00bfff; border-radius:20px 20px 0 0; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:#000; font-weight:bold;">📞 Звонок</span>
            <button id="closeCallBtn" style="background:none; border:none; color:#000; font-size:20px; cursor:pointer;">✖</button>
        </div>
        <div style="padding:15px; text-align:center;">
            <div id="callStatus" style="color:#ffdd00; margin-bottom:15px;">Гостевой канал</div>
            <video id="localVideo" autoplay muted style="width:100%; height:180px; background:#000; border-radius:12px; margin-bottom:10px;"></video>
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:10px;">
                <button id="toggleMicBtn" style="background:#ff3366; border:none; border-radius:50%; width:44px; height:44px; font-size:20px;">🎤</button>
                <button id="toggleCamBtn" style="background:#ff3366; border:none; border-radius:50%; width:44px; height:44px; font-size:20px;">📷</button>
                <button id="shareScreenBtn" style="background:#ff3366; border:none; border-radius:50%; width:44px; height:44px; font-size:20px;">🖥️</button>
            </div>
            <div id="participantsList" style="color:#aaa; font-size:12px; margin-top:10px; padding:8px; border-top:1px solid rgba(0,191,255,0.3);"></div>
            <button id="leaveCallBtn" style="margin-top:15px; padding:10px 20px; background:#ff4444; border:none; border-radius:30px; color:white;">📴 Покинуть звонок</button>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
