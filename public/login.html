<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad_STORM_Link - Вход</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="storm-bg">
        <div class="lightning"></div>
        <div class="login-container">
            <div class="storm-logo">
                <h1>Squad_STORM_Link</h1>
                <div class="subtitle">Спецсвязь</div>
            </div>
            
            <div class="login-box">
                <h2>Вход в систему</h2>
                
                <div class="input-group">
                    <input type="text" id="nickname" placeholder="Ник" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="Пароль">
                </div>
                
                <button id="loginBtn" class="storm-btn">Войти</button>
                
                <div id="errorMsg" class="error-message"></div>
            </div>
            
            <div class="storm-footer">
                <span>⚡ Squad_STORM_Link ⚡</span>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
